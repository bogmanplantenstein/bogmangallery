function parseDriveTree(tree) {
  const items = [];
  (tree || []).forEach(genusNode => {
    if (genusNode.type !== 'folder') return;
    const m     = genusNode.name.match(/^(.+?)\s*\((.+)\)$/);
    const gName = (m ? m[1] : genusNode.name).trim();
    const genus = GENERA.find(g => g.toLowerCase() === gName.toLowerCase()) || gName;
    const group = m ? m[2].trim() : '';

    (genusNode.children || []).forEach(spNode => {
      if (spNode.type !== 'folder') return;
      const nodeKids  = spNode.children || [];
      const photos    = nodeKids.filter(c => c.type === 'file').map(c => 'drive:' + c.id);
      const subFolders = nodeKids.filter(c => c.type === 'folder');
      const [sp, sub, entryType] = parseSpeciesFromTitle(spNode.name, genus);
      const displayName = buildAutoDisplayName(genus, sp, sub, entryType) || (genus + ' ' + spNode.name).trim();
      const match = detectDriveMatch(displayName, genus, photos);
      const parentItem = {
        id: generateId(), genus, species: sp, subspecies: sub,
        entryType: entryType || 'species', displayName, commonName: '', group, photos,
        driveFolderId: spNode.id, driveMatch: match.type, driveMatchName: match.name,
        driveMatchId: match.matchedId, driveNewPhotoCount: match.newPhotoCount,
        driveAmbiguous: match.ambiguousMatches,
        care: { override: false }, shopLinks: [], externalLinks: [], notes: '',
        parentId: '', isHybrid: spNode.name.includes(' x ') || spNode.name.includes(' × '),
        isGrex: false, flagged: match.type === 'similar',
        country: '', habitatId: '', climate: '', nativeRange: '', nativeHabitat: ''
      };
      items.push(parentItem);

      subFolders.forEach(subNode => {
        const subPhotos  = (subNode.children || []).filter(c => c.type === 'file').map(c => 'drive:' + c.id);
        const subDisplay = displayName + ' ' + subNode.name;
        const subMatch   = detectDriveMatch(subDisplay, genus, subPhotos);
        const [sp3,,type3] = parseSpeciesFromTitle(subNode.name, '');
        items.push({
          id: generateId(), genus, species: sp, subspecies: sp3 || subNode.name,
          entryType: type3 || 'cultivar_unreg', displayName: subDisplay, commonName: '', group,
          photos: subPhotos, driveFolderId: subNode.id,
          driveMatch: subMatch.type, driveMatchName: subMatch.name,
          driveMatchId: subMatch.matchedId, driveNewPhotoCount: subMatch.newPhotoCount,
          driveAmbiguous: subMatch.ambiguousMatches,
          care: { override: false }, shopLinks: [], externalLinks: [], notes: '',
          parentId: parentItem.id, isHybrid: false, isGrex: false, flagged: subMatch.type === 'similar',
          country: '', habitatId: '', climate: '', nativeRange: '', nativeHabitat: ''
        });
      });
    });
  });
  return items;
}

function detectDriveMatch(driveDisplayName, genus, drivePhotos) {
  drivePhotos = drivePhotos || [];

  function countNewPhotos(taxon) {
    if (!taxon) return drivePhotos.length;
    const existing = new Set(taxon.photos || []);
    return drivePhotos.filter(p => !existing.has(p)).length;
  }

  // Tier 1: exact display name match
  const exact = APP_DATA.taxa.find(t => t.displayName === driveDisplayName);
  if (exact) {
    return { type: 'exact', name: exact.displayName, matchedId: exact.id,
             newPhotoCount: countNewPhotos(exact), ambiguousMatches: [] };
  }

  // Tier 2: word-based match within same genus
  // Strategy: extract all meaningful words from the Drive folder name that are NOT
  // the genus name itself. Then find taxa of the same genus where ALL those words
  // appear in the taxon's normalized display name.
  // This handles "Dionaea Akai Ryu" → "Dionaea muscipula 'Akai Ryu'" because
  // unique words ["akai","ryu"] both appear in the normalized DB name.
  // It also uses species epithets to resolve ambiguity: "Drosera capensis Albino"
  // won't match "Drosera aliciae 'Albino'" because "capensis" != "aliciae".
  const norm      = normalizeForMatch(driveDisplayName);
  const genusLow  = (genus || '').toLowerCase();
  const allWords  = norm.split(' ').filter(w => w.length > 2);
  const uniqWords = allWords.filter(w => w !== genusLow);

  if (uniqWords.length > 0) {
    const sameGenus = APP_DATA.taxa.filter(t =>
      (t.genus || '').toLowerCase() === genusLow);
    const wordMatches = sameGenus.filter(t => {
      const tWords = normalizeForMatch(t.displayName).split(' ');
      return uniqWords.every(w => tWords.includes(w));
    });

    if (wordMatches.length === 1) {
      const m = wordMatches[0];
      return { type: 'matched', name: m.displayName, matchedId: m.id,
               newPhotoCount: countNewPhotos(m), ambiguousMatches: [] };
    }

    if (wordMatches.length > 1) {
      const amb = wordMatches.map(t => ({
        id: t.id, displayName: t.displayName, newPhotoCount: countNewPhotos(t)
      }));
      // Default to first candidate; user picks via dropdown
      return { type: 'ambiguous', name: amb[0].displayName, matchedId: amb[0].id,
               newPhotoCount: amb[0].newPhotoCount, ambiguousMatches: amb };
    }
  }

  // Tier 3: fuzzy cross-genus fallback (lowered threshold from 0.75 to 0.65)
  let bestScore = 0, bestTaxon = null;
  APP_DATA.taxa.forEach(t => {
    const s = matchScore(normalizeForMatch(t.displayName), norm);
    if (s > bestScore) { bestScore = s; bestTaxon = t; }
  });
  if (bestScore >= 0.65 && bestTaxon) {
    return { type: 'similar', name: bestTaxon.displayName, matchedId: bestTaxon.id,
             newPhotoCount: countNewPhotos(bestTaxon), ambiguousMatches: [] };
  }

  return { type: 'new', name: '', matchedId: null, newPhotoCount: drivePhotos.length, ambiguousMatches: [] };
}

// ═══ DRIVE IMPORT ACTIONS ════════════════════════════════════

async function doDriveScan() {
  const folderId = document.getElementById('drive-root-id')?.value?.trim();
  if (!folderId) { showToast('Enter a Drive folder ID first', 'error'); return; }
  DRIVE_ROOT_ID = folderId;
  const btn = document.getElementById('drive-scan-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Scanning…'; }
  try {
    const data = await apiPost('/api/drive/scan', { folderId });
    DRIVE_PREVIEW  = parseDriveTree(data.tree || []);
    // Auto-select new and similar (flag similar for review)
    // Auto-select: new, similar, ambiguous always; matched/exact only when they have new photos
    DRIVE_SELECTED = new Set(DRIVE_PREVIEW.filter(t => {
      if (t.driveMatch === 'new' || t.driveMatch === 'similar' || t.driveMatch === 'ambiguous') return true;
      if (t.driveMatch === 'matched' || t.driveMatch === 'exact') return t.driveNewPhotoCount > 0;
      return false;
    }).map(t => t.id));
    render();
    const newCount  = DRIVE_PREVIEW.filter(t => t.driveMatch === 'new').length;
    const matCount  = DRIVE_PREVIEW.filter(t => t.driveMatch === 'matched').length;
    const ambCount  = DRIVE_PREVIEW.filter(t => t.driveMatch === 'ambiguous').length;
    const simCount  = DRIVE_PREVIEW.filter(t => t.driveMatch === 'similar').length;
    const uptodate  = DRIVE_PREVIEW.filter(t => (t.driveMatch === 'exact' || t.driveMatch === 'matched') && t.driveNewPhotoCount === 0).length;
    showToast(
      'Found ' + DRIVE_PREVIEW.length + ' folders — ' +
      newCount + ' new, ' + matCount + ' matched, ' +
      (ambCount ? ambCount + ' ambiguous, ' : '') +
      (simCount ? simCount + ' similar, ' : '') +
      uptodate + ' up to date',
      'success'
    );
  } catch(e) {
    // Show error persistently on the page, not just as a toast
    const root = document.getElementById('drive-preview-root');
    if (root) {
      const isApiDisabled = e.message && e.message.includes('has not been used');
      root.innerHTML = '<div class="card" style="border-color:var(--red);margin-top:16px;">' +
        '<div style="color:var(--red);font-weight:400;margin-bottom:8px;">⚠ Scan failed</div>' +
        '<div style="font-size:12px;line-height:1.6;color:var(--white);">' + escHtml(e.message) + '</div>' +
        (isApiDisabled ? '<div style="margin-top:12px;"><a href="https://console.developers.google.com/apis/api/drive.googleapis.com/overview?project=408982510067" target="_blank" class="btn btn-accent btn-sm">Enable Google Drive API →</a></div>' : '') +
        '</div>';
    }
    showToast('Scan failed — see error below', 'error', 6000);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📁 Scan'; }
  }
}

function doImportDrive() {
  const toImport = DRIVE_PREVIEW.filter(t => DRIVE_SELECTED.has(t.id));
  if (!toImport.length) { showToast('No items selected', 'error'); return; }
  toImport.forEach(t => {
    // Use driveMatchId for matched/ambiguous/similar so the merge lands on the right
    // taxon even when the Drive folder name differs from the DB display name.
    const existing = t.driveMatchId
      ? APP_DATA.taxa.findIndex(x => x.id === t.driveMatchId)
      : APP_DATA.taxa.findIndex(x => x.displayName === t.displayName);
    const clean = { ...t };
    delete clean.driveMatch; delete clean.driveMatchName; delete clean.driveFolderId;
    delete clean.driveMatchId; delete clean.driveNewPhotoCount; delete clean.driveAmbiguous;
    if (existing >= 0) {
      // Merge: add Drive photos to existing taxon without overwriting care/shop data
      const ex = APP_DATA.taxa[existing];
      const newPhotos = (clean.photos || []).filter(p => !(ex.photos||[]).includes(p));
      APP_DATA.taxa[existing] = { ...ex, photos: [...(ex.photos||[]), ...newPhotos] };
      if (!ex.group && clean.group) APP_DATA.taxa[existing].group = clean.group;
    } else {
      APP_DATA.taxa.push(clean);
    }
  });
  syncGenusGroupsFromTaxa();
  saveData().then(() => {
    DRIVE_PREVIEW  = [];
    DRIVE_SELECTED = new Set();
    showToast('Imported ' + toImport.length + ' taxa from Drive', 'success');
    navigate('taxa');
  });
}

// ═══ MASS CARE COPY ══════════════════════════════════════════

function doMassCopyCare() {
  const srcId = document.getElementById('mass-care-src')?.value;
  if (!srcId) { showToast('Select a source taxon from the dropdown', 'error'); return; }
  const source = APP_DATA.taxa.find(t => t.id === srcId);
  if (!source) return;
  const care = { ...getEffectiveCare(source), override: true };
  let count = 0;
  MASS_SELECTED.forEach(id => {
    const t = APP_DATA.taxa.find(x => x.id === id);
    if (t) { t.care = care; count++; }
  });
  saveAndRender('Care applied to ' + count + ' taxa');
}

// ═══ FORM COLLECTION ═════════════════════════════════════════

function collectFormTaxon() {
  const form  = document.getElementById('taxon-form');
  if (!form) return null;
  const id    = form.dataset.taxonId;
  const existing = APP_DATA.taxa.find(t => t.id === id) || {};

  // Identity
  const genus     = document.getElementById('f-genus')?.value        || existing.genus || 'Drosera';
  const entryType = document.getElementById('f-entry-type')?.value   || existing.entryType || 'species';
  const species   = document.getElementById('f-species')?.value?.trim()    || existing.species || '';
  const subspecies= document.getElementById('f-subspecies')?.value?.trim() || existing.subspecies || '';
  const displayName= document.getElementById('f-display-name')?.value?.trim() || existing.displayName || '';
  const commonName = document.getElementById('f-common-name')?.value?.trim()  || '';
  const group      = document.getElementById('f-group')?.value?.trim()        || '';
  const parentId   = document.getElementById('f-parent-id')?.value?.trim()    || '';
  const isHybrid   = document.getElementById('f-hybrid')?.checked  || false;
  const isGrex     = document.getElementById('f-grex')?.checked    || false;
  const flagged    = document.getElementById('f-flagged')?.checked  || false;

  // Photos — read from tile grid (new) or legacy photo-url-input fields (fallback)
  const photos = getPhotoSrcsFromGrid().length
    ? getPhotoSrcsFromGrid()
    : [...document.querySelectorAll('.photo-url-input')].map(inp => inp.value.trim()).filter(Boolean);

  // Provenance
  const country       = document.getElementById('f-country')?.value?.trim()       || '';
  const habitatId     = document.getElementById('f-habitat')?.value               || '';
  const nativeRange   = document.getElementById('f-native-range')?.value?.trim()  || '';
  const nativeHabitat = document.getElementById('f-native-habitat')?.value?.trim()|| '';
  // Preserve AI confidence metadata if present (set by AI fill, not a form input)
  const provenanceConfidence = existing.provenanceConfidence || '';
  const provenanceWarning    = existing.provenanceWarning    || '';

  // Map & Climate
  const mapIncluded   = document.getElementById('f-map-included')?.checked ?? null;
  const mapOverride   = document.getElementById('f-map-override')?.value === '1';
  const mapPrecision  = document.getElementById('f-map-precision')?.value || 'exact';
  const mapLat        = parseFloat(document.getElementById('f-map-lat')?.value) || null;
  const mapLng        = parseFloat(document.getElementById('f-map-lng')?.value) || null;
  const mapElev       = parseFloat(document.getElementById('f-map-elev')?.value) || null;
  const mapRadius     = parseFloat(document.getElementById('f-map-radius')?.value) || null;
  const mapRegion     = document.getElementById('f-map-region')?.value?.trim().toUpperCase() || null;
  const mapCountry    = document.getElementById('f-map-country')?.value?.trim().toUpperCase() || null;
  const koppenZone    = (document.getElementById('f-koppen-zone')?.value?.trim().toUpperCase()) || null;
  const koppenLabel   = document.getElementById('f-koppen-label')?.value?.trim() || null;
  const elevationBand = document.getElementById('f-elev-band')?.value || null;
  const inatTaxonId   = parseInt(document.getElementById('f-inat-id')?.value) || null;
  const cnRaw         = document.getElementById('f-climate-normals')?.value;
  let climateNormals  = null;
  try { if (cnRaw) climateNormals = JSON.parse(cnRaw); } catch(_) {}

  // Build mapPin object — only include if the tab was ever touched (mapIncluded !== null)
  let mapPin = existing.mapPin || null;
  if (mapIncluded !== null) {
    const defaultIncluded = (entryType === 'species' || entryType === 'location');
    mapPin = {
      includedOnMap: mapIncluded,
      override: mapOverride || (mapIncluded !== defaultIncluded),
      coordinatePrecision: mapPrecision,
      lat: mapLat, lng: mapLng,
      elevationM:    mapElev,
      rangeRadiusKm: mapRadius,
      regionCode:  mapRegion  || null,
      countryCode: mapCountry || null
    };
  }

  // Care
  const override = document.getElementById('f-care-override')?.checked || false;
  const care = { override };
  if (override) {
    CARE_KEYS.forEach(k => { care[k] = document.getElementById('f-care-'+k)?.value?.trim() || ''; });
  }

  // Shop links
  const shopRows = document.querySelectorAll('#shop-rows .shop-row');
  const shopLinks = [...shopRows].map(row => ({
    label: row.querySelector('.shop-label-sel')?.value || '',
    url:   row.querySelector('.shop-url-inp')?.value?.trim() || ''
  })).filter(l => l.url);

  // External links
  const extRows = document.querySelectorAll('#ext-rows .ext-link-row');
  const externalLinks = [...extRows].map(row => ({
    site: row.querySelector('.ext-site-inp')?.value?.trim() || '',
    url:  row.querySelector('.ext-url-inp')?.value?.trim()  || ''
  })).filter(l => l.site);

  const notes = document.getElementById('f-notes')?.value?.trim() || '';

  return { id, genus, species, subspecies, entryType, displayName, commonName,
           group, photos, country, habitatId, nativeRange, nativeHabitat,
           provenanceConfidence, provenanceWarning,
           mapPin, koppenZone, koppenLabel, elevationBand, inatTaxonId, climateNormals,
           care, shopLinks, externalLinks, notes, parentId, isHybrid, isGrex, flagged,
           // Preserve existing fields not managed by this form
           slug: existing.slug || null };
}

// ═══ EVENT HANDLERS ══════════════════════════════════════════

function attachPageEvents() {
  const main = document.getElementById('main-area');
  if (!main) return;

  // Generic page navigation via data-page attribute
  main.addEventListener('click', e => {
    const pg = e.target.closest('[data-page]')?.dataset.page;
    if (pg) { if (pg==='add') { EDIT_TAXON_ID=null; ACTIVE_TAB='identity'; } navigate(pg); return; }

    // Tab switching
    const tab = e.target.closest('.tab-btn')?.dataset.tab;
    if (tab) { showTab(tab); return; }

    // Mass-select row click — intercept before edit so whole row is clickable in select mode
    const massRowId = e.target.closest('[data-mass-id]')?.dataset.massId;
    if (massRowId && MASS_MODE) {
      if (MASS_SELECTED.has(massRowId)) MASS_SELECTED.delete(massRowId);
      else MASS_SELECTED.add(massRowId);
      renderMassState(); return;
    }

    // Entry type pill — open picker (must come before row-click to short-circuit navigation)
    const pillTaxonId = e.target.closest('[data-entry-pill]')?.dataset.entryPill;
    if (pillTaxonId && !MASS_MODE) {
      showEntryTypePicker(pillTaxonId, e.target.closest('[data-entry-pill]'));
      return;
    }

    // Click anywhere on a taxa list row (non-mass mode) to edit
    const rowId = e.target.closest('.taxa-list-item')?.dataset.taxonId;
    if (rowId && !MASS_MODE && !e.target.closest('button')) {
      EDIT_TAXON_ID = rowId; ACTIVE_TAB = 'identity'; navigate('edit', {editId: rowId}); return;
    }

    // Edit taxon
    const editId = e.target.closest('[data-edit-id]')?.dataset.editId;
    if (editId) { EDIT_TAXON_ID = editId; ACTIVE_TAB = 'identity'; navigate('edit', {editId}); return; }

    // Delete taxon
    const delId = e.target.closest('[data-delete-id]')?.dataset.deleteId;
    if (delId) {
      const t = APP_DATA.taxa.find(x => x.id === delId);
      if (confirm('Delete "' + (t?.displayName||delId) + '"?')) {
        APP_DATA.taxa = APP_DATA.taxa.filter(x => x.id !== delId);
        saveAndRender('Deleted');
      }
      return;
    }

    // ── Duplicate finder actions ──
    if (e.target.id === 'dupe-find-btn')         { doFindDupes(); return; }
    if (e.target.id === 'dupe-ai-btn')           { doAiReviewDupes(); return; }
    if (e.target.id === 'dupe-bulk-delete-btn')  { doBulkDeleteDupes(); return; }
    if (e.target.id === 'dupe-show-dismissed') {
      const dl = document.getElementById('dupe-dismissed-list');
      if (dl) { dl.style.display = dl.style.display === 'none' ? 'block' : 'none'; } return;
    }
    const dupeMarkIdx = e.target.closest('[data-dupe-mark]')?.dataset.dupeMark;
    if (dupeMarkIdx !== undefined) {
      DUPE_RESULTS[parseInt(dupeMarkIdx)].status = 'delete'; render(); return;
    }
    const dupeDismissIdx = e.target.closest('[data-dupe-dismiss]')?.dataset.dupeDismiss;
    if (dupeDismissIdx !== undefined) {
      DUPE_RESULTS[parseInt(dupeDismissIdx)].status = 'keep'; render(); return;
    }
    const dupeUndoIdx = e.target.closest('[data-dupe-undo]')?.dataset.dupeUndo;
    if (dupeUndoIdx !== undefined) {
      DUPE_RESULTS[parseInt(dupeUndoIdx)].status = 'pending'; render(); return;
    }
    const dupeSwapIdx = e.target.closest('[data-dupe-swap]')?.dataset.dupeSwap;
    if (dupeSwapIdx !== undefined) {
      const p = DUPE_RESULTS[parseInt(dupeSwapIdx)];
      [p.keep, p.del] = [p.del, p.keep]; render(); return;
    }

    // Match site tabs
    const matchSite = e.target.closest('[data-match-site]')?.dataset.matchSite;
    if (matchSite) { LINK_MATCH_SITE = matchSite; LINK_MATCH_RESULTS = []; render(); return; }

    // Approve match
    const approveIdx = e.target.closest('[data-approve-match]')?.dataset.approveMatch;
    if (approveIdx !== undefined) { approveMatch(parseInt(approveIdx)); return; }

    // Reject match
    const rejectIdx = e.target.closest('[data-reject-match]')?.dataset.rejectMatch;
    if (rejectIdx !== undefined) { LINK_MATCH_RESULTS[parseInt(rejectIdx)].rejected = true; re_renderMatchTable(); return; }

    // Open admin lightbox on tile click
    const tile = e.target.closest('.photo-tile');
    if (tile && !e.target.closest('.photo-tile-remove')) {
      openAdminLb(parseInt(tile.dataset.photoIdx || '0'));
      return;
    }

    // Toggle URL edit panel
    if (e.target.id === 'photo-url-toggle') {
      const body = document.getElementById('photo-url-body');
      const tog  = document.getElementById('photo-url-toggle');
      if (body) body.classList.toggle('open');
      if (tog)  tog.textContent = (body?.classList.contains('open') ? '▾' : '▸') + ' Edit URLs';
      return;
    }

    // Remove photo
    const rmPhoto = e.target.closest('[data-remove-photo]')?.dataset.removePhoto;
    if (rmPhoto !== undefined) { removePhotoRow(parseInt(rmPhoto)); return; }

    // Add photo URL
    if (e.target.id === 'add-photo-url-btn') { addPhotoUrl(); return; }

    // Add shop link
    if (e.target.id === 'add-shop-btn') { addShopRow(); return; }

    // Add ext link
    if (e.target.id === 'add-ext-btn') { addExtRow(); return; }

    // Remove shop
    const rmShop = e.target.closest('[data-remove-shop]')?.dataset.removeShop;
    if (rmShop !== undefined) { e.target.closest('.shop-row').remove(); return; }

    // Remove ext link
    const rmExt = e.target.closest('[data-remove-ext]')?.dataset.removeExt;
    if (rmExt !== undefined) { e.target.closest('.ext-link-row').remove(); return; }

    // Save taxon (button exists in tab bar and on review tab)
    if (e.target.closest('.save-taxon-btn')) { doSaveTaxon(); return; }

    // Care override toggle
    if (e.target.id === 'f-care-override') { toggleCareOverride(e.target.checked); return; }

    // Copy care preview
    if (e.target.id === 'copy-care-preview-btn') { doCopyCarePreview(); return; }

    // Apply copied care fields (delegated — avoids duplicate listeners from repeated previews)
    if (e.target.id === 'apply-copy-care-btn') { doApplyCopyCare(); return; }

    // Fill care from product page
    if (e.target.id === 'fill-care-btn') { doFillCare(); return; }

    // Publish button
    if (e.target.id === 'publish-btn') { doPublish(); return; }

    // Git status + validation (page renders these, but they need to be loaded async)
    if (CURRENT_PAGE === 'push') setTimeout(loadGitStatus, 50);

    // Save group care
    if (e.target.id === 'save-groupcare-btn') { doSaveGroupCare(); return; }

    // Fetch CPPF index
    if (e.target.id === 'fetch-cppf-btn') { doFetchCPPF(); return; }
    if (e.target.id === 'fetch-ff-btn')   { doFetchFF();   return; }
    if (e.target.id === 'fetch-icps-btn') { doFetchICPS(); return; }

    // Run match
    if (e.target.id === 'run-match-btn') { doRunMatch(); return; }

    // Batch approve
    if (e.target.id === 'batch-approve-btn') { doBatchApprove(); return; }

    // Genus photos
    const rmGP = e.target.closest('[data-remove-genus-photo]')?.dataset.removeGenusPhoto;
    if (rmGP) { const [g,i] = rmGP.split(':');
      if (APP_DATA.genusCoverPhotos[g]) { APP_DATA.genusCoverPhotos[g].splice(parseInt(i),1); }
      saveAndRender(); return; }

    // Remove habitat row (save current DOM state first, then splice)
    const rmHabIdx = e.target.closest('[data-remove-hab]')?.dataset.removeHab;
    if (rmHabIdx !== undefined) {
      doSaveHabitats(); // flush any edited values to APP_DATA first
      APP_DATA.habitats.splice(parseInt(rmHabIdx), 1);
      saveAndRender(); return;
    }

    // Remove ext site row
    const rmSiteIdx = e.target.closest('[data-remove-site]')?.dataset.removeSite;
    if (rmSiteIdx !== undefined) {
      doSaveExtSites(); // flush any edited values first
      APP_DATA.extSites.splice(parseInt(rmSiteIdx), 1);
      saveAndRender(); return;
    }

    // Habitat batch research buttons
    if (e.target.id === 'hab-batch-empty-btn') { doBatchProvenance('empty'); return; }
    if (e.target.id === 'hab-batch-all-btn')   { doBatchProvenance('all');   return; }
    // Batch geocode buttons
    if (e.target.id === 'geo-batch-empty-btn') { doBatchGeocode('empty'); return; }
    if (e.target.id === 'geo-batch-all-btn')   { doBatchGeocode('all');   return; }
    if (e.target.id === 'hab-suggest-btn')     { doSuggestHabitats();        return; }
    if (e.target.id === 'hab-apply-suggest-btn') { doApplyHabitatSuggestions(); return; }

    // Habitats / sites / genus photo save buttons
    if (e.target.id === 'save-header-content-btn') { doSaveHeaderContent(); return; }
    if (e.target.id === 'save-habitats-btn') { doSaveHabitats(); return; }
    if (e.target.id === 'save-sites-btn')    { doSaveExtSites(); return; }
    if (e.target.id === 'add-hab-btn')       { doAddHabitat(); return; }
    if (e.target.id === 'add-site-btn')      { doAddExtSite(); return; }
    if (e.target.id === 'export-json-btn')   { doExportJSON(); return; }
    if (e.target.id === 'import-json-btn')   { document.getElementById('import-file')?.click(); return; }
    if (e.target.id === 'clear-data-btn')    { doClearData(); return; }

    // CSV
    if (e.target.id === 'parse-csv-btn')    { doParseCSV(); return; }
    if (e.target.id === 'import-csv-btn')   { doImportCSV(); return; }
    if (e.target.id === 'clear-csv-btn')    { CSV_PREVIEW=[]; CSV_SELECTED.clear(); render(); return; }
    if (e.target.id === 'csv-sel-all-btn')  { CSV_PREVIEW.forEach(r => CSV_SELECTED.add(r.displayName)); refreshCSVPreview(); return; }
    if (e.target.id === 'csv-sel-none-btn') { CSV_SELECTED.clear(); refreshCSVPreview(); return; }
    if (e.target.id === 'csv-sel-new-btn')  {
      CSV_SELECTED.clear();
      CSV_PREVIEW.forEach(r => { if (r._diff?.isNew) CSV_SELECTED.add(r.displayName); });
      refreshCSVPreview(); return;
    }
    if (e.target.id === 'csv-sel-upd-btn') {
      CSV_SELECTED.clear();
      CSV_PREVIEW.forEach(r => { if (r._diff?.hasChanges) CSV_SELECTED.add(r.displayName); });
      refreshCSVPreview(); return;
    }
    // CSV row click — toggle selection
    const csvRow = e.target.closest('[data-csv-name]');
    if (csvRow) {
      const name = csvRow.dataset.csvName;
      if (CSV_SELECTED.has(name)) CSV_SELECTED.delete(name);
      else CSV_SELECTED.add(name);
      // Update this row visually without re-rendering the whole list
      const sel = CSV_SELECTED.has(name);
      csvRow.style.background   = sel ? 'var(--accent-bg)' : 'transparent';
      csvRow.style.borderColor  = sel ? 'rgba(200,169,110,0.4)' : 'var(--border)';
      const ind = csvRow.querySelector('.mass-sel-indicator');
      if (ind) { ind.style.borderColor = sel ? 'var(--accent)' : 'var(--dimmer)'; ind.style.background = sel ? 'var(--accent)' : 'transparent'; ind.style.color = sel ? 'var(--bg)' : ''; ind.textContent = sel ? '✓' : ''; }
      const lbl = document.getElementById('csv-sel-count');
      if (lbl) lbl.textContent = CSV_SELECTED.size + ' selected';
      const importBtn = document.getElementById('import-csv-btn');
      if (importBtn) importBtn.textContent = 'Import ' + CSV_SELECTED.size + ' Selected';
      return;
    }

    // Drive import
    if (e.target.id === 'drive-scan-btn')    { doDriveScan(); return; }
    if (e.target.id === 'import-drive-btn')  { doImportDrive(); return; }
    if (e.target.id === 'clear-drive-btn')   { DRIVE_PREVIEW=[]; DRIVE_SELECTED.clear(); render(); return; }
    if (e.target.id === 'drive-sel-all-btn') { DRIVE_PREVIEW.forEach(r => DRIVE_SELECTED.add(r.id)); refreshDrivePreview(); return; }
    if (e.target.id === 'drive-sel-none-btn'){ DRIVE_SELECTED.clear(); refreshDrivePreview(); return; }
    if (e.target.id === 'drive-sel-new-btn') {
      DRIVE_SELECTED = new Set(DRIVE_PREVIEW.filter(t => {
        if (t.driveMatch === 'new' || t.driveMatch === 'similar' || t.driveMatch === 'ambiguous') return true;
        if (t.driveMatch === 'matched' || t.driveMatch === 'exact') return t.driveNewPhotoCount > 0;
        return false;
      }).map(t => t.id));
      refreshDrivePreview(); return;
    }
    // Drive row click — toggle selection
    const driveRow = e.target.closest('.drive-row-top[data-drive-id]');
    if (driveRow) {
      const id = driveRow.dataset.driveId;
      if (DRIVE_SELECTED.has(id)) DRIVE_SELECTED.delete(id);
      else DRIVE_SELECTED.add(id);
      const sel = DRIVE_SELECTED.has(id);
      // Style update targets the outer .drive-import-row wrapper
      const outerRow = driveRow.closest('.drive-import-row');
      if (outerRow) {
        outerRow.style.background  = sel ? 'var(--accent-bg)' : 'transparent';
        outerRow.style.borderColor = sel ? 'rgba(200,169,110,0.4)' : 'var(--border)';
      }
      const ind = driveRow.querySelector('.mass-sel-indicator');
      if (ind) { ind.style.borderColor = sel ? 'var(--accent)' : 'var(--dimmer)'; ind.style.background = sel ? 'var(--accent)' : 'transparent'; ind.style.color = sel ? 'var(--bg)' : ''; ind.textContent = sel ? '✓' : ''; }
      const lbl = document.getElementById('drive-sel-count');
      if (lbl) lbl.textContent = DRIVE_SELECTED.size + ' selected';
      const importBtn = document.getElementById('import-drive-btn');
      if (importBtn) importBtn.textContent = 'Import ' + DRIVE_SELECTED.size + ' Selected';
      return;
    }

    // Groups page actions
    const addGrp = e.target.closest('[data-add-group]')?.dataset.addGroup;
    if (addGrp) { doAddGroup(addGrp); return; }
    const rmGrp = e.target.closest('[data-remove-group]')?.dataset.removeGroup;
    if (rmGrp) { const [g,i]=rmGrp.split(':');
      APP_DATA.genusGroups[g]?.splice(parseInt(i),1);
      saveAndRender(); return; }
    const moveUp = e.target.closest('[data-move-group-up]')?.dataset.moveGroupUp;
    if (moveUp) { const [g,i]=moveUp.split(':'); const idx=parseInt(i);
      const arr=APP_DATA.genusGroups[g]; if (arr && idx>0) { [arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]]; saveAndRender(); } return; }
    const moveDn = e.target.closest('[data-move-group-down]')?.dataset.moveGroupDown;
    if (moveDn) { const [g,i]=moveDn.split(':'); const idx=parseInt(i);
      const arr=APP_DATA.genusGroups[g]; if (arr && idx<arr.length-1) { [arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]]; saveAndRender(); } return; }
    const syncGrp = e.target.closest('[data-sync-genus]')?.dataset.syncGenus;
    if (syncGrp) { syncGenusGroupsFromTaxa(); saveAndRender(); return; }

    // Mass mode
    if (e.target.id === 'mass-mode-btn') { MASS_MODE = !MASS_MODE; MASS_SELECTED.clear(); render(); return; }
    if (e.target.id === 'mass-all-btn')  { getFilteredTaxa().forEach(t => MASS_SELECTED.add(t.id)); renderMassState(); return; }
    if (e.target.id === 'mass-none-btn') { MASS_SELECTED.clear(); renderMassState(); return; }
    if (e.target.id === 'mass-group-btn')     { doMassSetGroup(); return; }
    if (e.target.id === 'mass-delete-btn')    { doMassDelete(); return; }
    if (e.target.id === 'mass-prov-btn')      { doMassProvenance(); return; }
    if (e.target.id === 'mass-ai-btn')        { doMassAI(); return; }
    if (e.target.id === 'mass-copy-care-btn') { doMassCopyCare(); return; }
    if (e.target.id === 'ai-prov-btn')        { doFillProvenance(); return; }


    // Link templates
    const addTplG = e.target.closest('[data-add-tpl-genus]')?.dataset.addTplGenus;
    if (addTplG) { if (!APP_DATA.extLinkTemplates.genus[addTplG]) APP_DATA.extLinkTemplates.genus[addTplG]=[];
      APP_DATA.extLinkTemplates.genus[addTplG].push({site:''}); saveAndRender(); return; }
    const addTplGr = e.target.closest('[data-add-tpl-group]')?.dataset.addTplGroup;
    if (addTplGr) { if (!APP_DATA.extLinkTemplates.group[addTplGr]) APP_DATA.extLinkTemplates.group[addTplGr]=[];
      APP_DATA.extLinkTemplates.group[addTplGr].push({site:''}); saveAndRender(); return; }
    const rmTplG = e.target.closest('[data-remove-tpl-genus]')?.dataset.removeTplGenus;
    if (rmTplG) { const [g,i]=rmTplG.split(':');
      APP_DATA.extLinkTemplates.genus[g]?.splice(parseInt(i),1); saveAndRender(); return; }
    const rmTplGr = e.target.closest('[data-remove-tpl-group]')?.dataset.removeTplGroup;
    if (rmTplGr) { const [g,i]=rmTplGr.split(':');
      APP_DATA.extLinkTemplates.group[g]?.splice(parseInt(i),1); saveAndRender(); return; }
  });

  // Live filter events for taxa list
  main.addEventListener('input', e => {
    // Sync URL panel edits back to tile data-photo-src
    if (e.target.classList.contains('photo-url-vis')) {
      const idx = parseInt(e.target.dataset.urlIdx);
      const grid = document.getElementById('photo-grid');
      if (grid) {
        const tiles = grid.querySelectorAll('.photo-tile');
        if (tiles[idx]) {
          tiles[idx].dataset.photoSrc = e.target.value.trim();
          const img = tiles[idx].querySelector('img');
          if (img) img.src = resolvePhotoUrl(e.target.value.trim(), 'w200');
          const badge = tiles[idx].querySelector('.photo-tile-badge');
          if (badge) {
            const src = e.target.value.trim();
            badge.textContent = photoSourceLabel(src);
            badge.className = 'photo-tile-badge' + (src.startsWith('drive:') ? ' drive' : '');
          }
        }
      }
      return;
    }
    if (e.target.id==='taxa-search')      { TAXA_SEARCH=e.target.value; refreshTaxaList(); }
    if (e.target.id==='taxa-genus-filter'){ TAXA_GENUS=e.target.value;  refreshTaxaList(); }
    if (e.target.id==='taxa-group-filter'){ TAXA_GROUP=e.target.value;  refreshTaxaList(); }
    if (e.target.id==='taxa-comp-filter') { TAXA_FILTER=e.target.value; refreshTaxaList(); }
    if (e.target.id==='match-genus-sel')  { LINK_MATCH_GENUS=e.target.value; LINK_MATCH_RESULTS=[]; render(); }
    if (e.target.id==='groupcare-sel')    { render(); }
    // Auto-generate display name when identity fields change
    if (['f-genus','f-species','f-subspecies','f-entry-type'].includes(e.target.id)) { autoDisplayName(); }
    // Mark display name as manually edited so autoDisplayName stops overwriting it
    if (e.target.id === 'f-display-name') { e.target.dataset.manuallyEdited = '1'; }
    // Parent search datalist — auto-populate the hidden f-parent-id field
    if (e.target.id === 'f-parent-search') {
      const val = e.target.value.trim();
      const match = APP_DATA.taxa.find(t => t.displayName === val || t.id === val);
      const hidEl = document.getElementById('f-parent-id');
      if (hidEl) hidEl.value = match ? match.id : '';
    }
    // Genus photo inputs — save on change
    if (e.target.classList.contains('genus-photo-input')) { scheduleGenusPhotoSave(e.target); }
    // Group name rename (on blur below)
  });

  // Delegated change events
  main.addEventListener('change', e => {
    // Ambiguous Drive match dropdown — user picks which taxon to merge into
    if (e.target.dataset.driveAmbId) {
      const driveId   = e.target.dataset.driveAmbId;
      const taxonId   = e.target.value;
      const item      = DRIVE_PREVIEW.find(t => t.id === driveId);
      const taxon     = APP_DATA.taxa.find(x => x.id === taxonId);
      if (item && taxon) {
        item.driveMatchId   = taxonId;
        item.driveMatchName = taxon.displayName;
        // Recompute new photo count for the newly selected taxon
        const existing = new Set(taxon.photos || []);
        item.driveNewPhotoCount = (item.photos || []).filter(p => !existing.has(p)).length;
        // Update the photo count badge in the row without full re-render
        const countEl = document.querySelector('[data-drive-new-count="' + driveId + '"]');
        if (countEl) {
          countEl.textContent = item.driveNewPhotoCount > 0
            ? '+' + item.driveNewPhotoCount + ' new 📷'
            : '0 new 📷';
        }
        // Auto-select if there are new photos, deselect if not
        if (item.driveNewPhotoCount > 0) {
          DRIVE_SELECTED.add(driveId);
        } else {
          DRIVE_SELECTED.delete(driveId);
        }
        // Update selection count badge
        const selCnt = document.getElementById('drive-sel-count');
        if (selCnt) selCnt.textContent = DRIVE_SELECTED.size + ' selected';
      }
      return;
    }
  });

  // Group name rename on blur
  main.addEventListener('focusout', e => {
    if (!e.target.classList.contains('group-name-input')) return;
    const genus = e.target.dataset.genus;
    const idx   = parseInt(e.target.dataset.idx);
    const val   = e.target.value.trim();
    const arr   = APP_DATA.genusGroups[genus];
    if (!arr || arr[idx] === val) return;
    if (!val) { e.target.value = arr[idx]; return; } // revert empty
    const oldName = arr[idx];
    arr[idx] = val;
    // Cascade rename to taxa and care defaults
    APP_DATA.taxa.forEach(t => { if (t.group === oldName) t.group = val; });
    if (APP_DATA.groupCareDefaults && APP_DATA.groupCareDefaults[oldName]) {
      APP_DATA.groupCareDefaults[val] = APP_DATA.groupCareDefaults[oldName];
      delete APP_DATA.groupCareDefaults[oldName];
    }
    saveAndRender('Group renamed to "' + val + '"');
  });

  // File inputs
  const importFile = document.getElementById('import-file');
  if (importFile) importFile.addEventListener('change', e => doImportJSON(e.target.files[0]));

  // Publish page: load git status on render
  if (CURRENT_PAGE === 'push') setTimeout(loadGitStatus, 80);

  // Photo drag-drop
  attachPhotoDrop();
  attachPhotoGridDrag();
}

function refreshTaxaList() {
  const container = document.getElementById('taxa-list-container');
  if (container) container.innerHTML = renderTaxaItems(getFilteredTaxa());
  const lbl = document.getElementById('taxa-count-label');
  if (lbl) lbl.textContent = getFilteredTaxa().length + ' / ' + APP_DATA.taxa.length;
}

function showEntryTypePicker(taxonId, anchorEl) {
  document.querySelectorAll('.entry-type-picker').forEach(p => p.remove());
  const t = APP_DATA.taxa.find(x => x.id === taxonId);
  if (!t) return;

  const rect = anchorEl.getBoundingClientRect();
  const picker = document.createElement('div');
  picker.className = 'entry-type-picker';
  picker.style.cssText = 'position:fixed;z-index:9999;top:' + (rect.bottom + 4) + 'px;left:' + rect.left + 'px;';

  ENTRY_TYPES.forEach(et => {
    const opt = document.createElement('div');
    opt.className = 'entry-type-picker-opt' + (t.entryType === et.id ? ' current' : '');
    opt.textContent = et.label.split('(')[0].trim();
    opt.addEventListener('click', ev => {
      ev.stopPropagation();
      t.entryType = et.id;
      saveData();
      refreshTaxaList();
      picker.remove();
    });
    picker.appendChild(opt);
  });

  document.body.appendChild(picker);

  // Close on outside click
  const close = ev => {
    if (!picker.contains(ev.target)) {
      picker.remove();
      document.removeEventListener('click', close, true);
    }
  };
  setTimeout(() => document.addEventListener('click', close, true), 0);
}

function renderMassState() {
  // Ensure the taxa list is populated before trying to update checkboxes
  const container = document.getElementById('taxa-list-container');
  if (container && !container.children.length) refreshTaxaList();

  const n = MASS_SELECTED.size;
  const lbl = document.getElementById('mass-count');
  if (lbl) lbl.textContent = n + ' selected';
  ['mass-group-btn','mass-group-sel','mass-group-new','mass-delete-btn','mass-prov-btn','mass-ai-btn','mass-copy-care-btn','mass-care-src'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = n === 0;
  });
  // Refresh visual selection indicators
  document.querySelectorAll('[data-mass-id]').forEach(row => {
    const id = row.dataset.massId;
    const sel = MASS_SELECTED.has(id);
    row.classList.toggle('mass-checked', sel);
    const ind = row.querySelector('.mass-sel-indicator');
    if (ind) ind.textContent = sel ? '✓' : '';
  });
}

// ═══ FORM ACTIONS ════════════════════════════════════════════

function autoDisplayName() {
  const genus = document.getElementById('f-genus')?.value || '';
  const sp    = document.getElementById('f-species')?.value?.trim() || '';
  const sub   = document.getElementById('f-subspecies')?.value?.trim() || '';
  const type  = document.getElementById('f-entry-type')?.value || 'species';
  const nameEl= document.getElementById('f-display-name');
  if (nameEl && !nameEl.dataset.manuallyEdited) {
    const auto = buildAutoDisplayName(genus, sp, sub, type);
    if (auto) nameEl.value = auto;
  }
}

async function doSaveTaxon() {
  const btns = document.querySelectorAll('.save-taxon-btn');
  btns.forEach(b => { b.disabled = true; b.dataset.origLabel = b.textContent; b.textContent = 'Saving…'; });
  try {
    const taxon = collectFormTaxon();
    if (!taxon) { showToast('Could not read form', 'error'); return; }
    if (!taxon.displayName) { showToast('Display name is required', 'error'); showTab('identity'); return; }
    const idx = APP_DATA.taxa.findIndex(t => t.id === taxon.id);
    if (idx >= 0) APP_DATA.taxa[idx] = taxon;
    else APP_DATA.taxa.push(taxon);
    syncGenusGroupsFromTaxa();
    await saveData();
    showToast('Taxon saved', 'success');
    navigate('taxa');
  } catch(e) {
    showToast('Save failed: ' + e.message, 'error');
  } finally {
    btns.forEach(b => { b.disabled = false; b.textContent = b.dataset.origLabel || 'Save'; });
  }
}

function toggleCareOverride(checked) {
  CARE_KEYS.forEach(k => {
    const ta = document.getElementById('f-care-'+k);
    if (!ta) return;
    ta.readOnly = !checked;
    ta.className = checked ? '' : 'care-inherited';
    ta.placeholder = checked ? '' : 'Inherited from group';
  });
}

function doCopyCarePreview() {
  const sel = document.getElementById('copy-care-source');
  const preview = document.getElementById('copy-care-preview');
  if (!sel || !preview) return;
  const source = APP_DATA.taxa.find(t => t.id === sel.value);
  if (!source) { preview.innerHTML = ''; return; }
  const care = getEffectiveCare(source);
  const fields = CARE_KEYS.filter(k => care[k]);
  // Store source ID so the delegated click handler can look up care data
  preview.dataset.sourceId = source.id;
  preview.innerHTML = '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-top:4px;">' +
    '<div style="font-size:10px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">'+escHtml(source.displayName)+'</div>' +
    fields.map(k =>
      '<div style="margin-bottom:8px;">' +
      '<label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;">' +
      '<input type="checkbox" class="copy-care-cb" data-care-key="'+k+'" checked style="margin-top:2px;flex-shrink:0;">' +
      '<span><span style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dimmer);">'+CARE_LABELS[k]+'</span>' +
      '<br><span style="font-size:11px;color:var(--white);">'+escHtml(care[k])+'</span></span></label></div>'
    ).join('') +
    (fields.length ? '<button class="btn btn-accent btn-sm" id="apply-copy-care-btn" type="button" style="margin-top:4px;">Apply Selected Fields</button>' : '<div style="color:var(--dimmer);font-size:11px;">No care data on this taxon.</div>') +
    '</div>';
}

function doApplyCopyCare() {
  const preview = document.getElementById('copy-care-preview');
  if (!preview?.dataset.sourceId) return;
  const source = APP_DATA.taxa.find(t => t.id === preview.dataset.sourceId);
  if (!source) return;
  const care = getEffectiveCare(source);
  document.querySelectorAll('.copy-care-cb:checked').forEach(cb => {
    const k = cb.dataset.careKey;
    const ta = document.getElementById('f-care-'+k);
    if (ta) ta.value = care[k] || '';
  });
  showToast('Care fields copied', 'success');
  const ovEl = document.getElementById('f-care-override');
  if (ovEl && !ovEl.checked) { ovEl.checked = true; toggleCareOverride(true); }
}

async function doFillCare() {
  const html = document.getElementById('product-page-paste')?.value?.trim() || '';
  if (!html) { showToast('Paste the product page HTML in the textarea first', 'error'); return; }
  const care = parseCareFromHtml(html);
  if (!care) { showToast('No Growing Information section found in this page', 'error'); return; }
  CARE_KEYS.forEach(k => { if (care[k]) { const ta=document.getElementById('f-care-'+k); if(ta) ta.value=care[k]; }});
  const ov = document.getElementById('f-care-override');
  if (ov && !ov.checked) { ov.checked=true; toggleCareOverride(true); }
  showToast('Care filled from product page', 'success');
}

// ═══ PHOTO MANAGEMENT ════════════════════════════════════════

function addPhotoUrl() {
  const inp = document.getElementById('new-photo-url');
  if (!inp || !inp.value.trim()) return;
  let src = inp.value.trim();
  // Auto-prefix if plain URL
  if (src.startsWith('https://images.squarespace-cdn.com') && !src.startsWith('sq:')) src = 'sq:' + src;
  addPhotoRow(src);
  inp.value = '';
}

function getPhotoSrcsFromGrid() {
  const grid = document.getElementById('photo-grid');
  if (!grid) return [];
  return [...grid.querySelectorAll('.photo-tile')].map(t => t.dataset.photoSrc || '').filter(Boolean);
}

function addPhotoRow(src) {
  const grid = document.getElementById('photo-grid');
  if (!grid) {
    // Grid doesn't exist yet (no photos before) — full re-render of tab
    const t = APP_DATA.taxa.find(x => x.id === EDIT_TAXON_ID);
    if (t) { t.photos = [...(t.photos || []), src]; }
    const tabEl = document.getElementById('tab-photos');
    if (tabEl) tabEl.outerHTML = renderTabPhotos(
      APP_DATA.taxa.find(x => x.id === EDIT_TAXON_ID) || { photos: [src] }
    );
    attachPhotoDrop();
    attachPhotoGridDrag();
    return;
  }
  const i = grid.children.length;
  const div = document.createElement('div');
  div.className = 'photo-tile';
  div.draggable = true;
  div.dataset.photoIdx = i;
  div.dataset.photoSrc = src;

    '<img src="' + escHtml(resolvePhotoUrl(src, 'w200')) + '" alt="" loading="lazy" onerror="this.style.opacity=\'0\'">' +
    '<span class="photo-tile-num">#' + (i + 1) + '</span>' +
    '<span class="photo-tile-badge' + (src.startsWith('drive:') ? ' drive' : '') + '">' + photoSourceLabel(src) + '</span>' +
    '<button class="photo-tile-remove" data-remove-photo="' + i + '" type="button" title="Remove">×</button>';
  grid.appendChild(div);
  // Also add a row to the URL panel if it's open
  const urlBody = document.getElementById('photo-url-body');
  if (urlBody) {
    const row = document.createElement('div');
    row.className = 'photo-url-vis-row';
    row.innerHTML = '<span class="photo-url-vis-num">' + (i + 1) + '</span>' +
      '<input type="text" class="photo-url-vis" data-url-idx="' + i + '" value="' + escHtml(src) + '" style="flex:1;" placeholder="sq:URL or drive:FILE_ID">';
    urlBody.appendChild(row);
  }
}

function attachPhotoDrop() {
  const zone = document.getElementById('photo-drop-zone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const url = e.dataTransfer.getData('text/uri-list') ||
                e.dataTransfer.getData('text/plain') ||
                (e.dataTransfer.getData('text/html')||'').match(/src="([^"]+)"/)?.[1] || '';
    if (url) addPhotoRow(url.startsWith('sq:') ? url : 'sq:'+url);
  });
}

function attachPhotoGridDrag() {
  const grid = document.getElementById('photo-grid');
  if (!grid) return;
  let dragSrc = null;

  grid.addEventListener('dragstart', function(e) {
    const tile = e.target.closest('.photo-tile');
    if (!tile) return;
    dragSrc = tile;
    setTimeout(() => tile.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  grid.addEventListener('dragend', function(e) {
    const tile = e.target.closest('.photo-tile');
    if (tile) tile.classList.remove('dragging');
    grid.querySelectorAll('.photo-tile').forEach(t => t.classList.remove('drag-over'));
    dragSrc = null;
  });
  grid.addEventListener('dragover', function(e) {
    e.preventDefault();
    const tile = e.target.closest('.photo-tile');
    if (!tile || tile === dragSrc) return;
    grid.querySelectorAll('.photo-tile').forEach(t => t.classList.remove('drag-over'));
    tile.classList.add('drag-over');
  });
  grid.addEventListener('dragleave', function(e) {
    const tile = e.target.closest('.photo-tile');
    if (tile) tile.classList.remove('drag-over');
  });
  grid.addEventListener('drop', function(e) {
    e.preventDefault();
    const tile = e.target.closest('.photo-tile');
    if (!tile || !dragSrc || tile === dragSrc) return;
    tile.classList.remove('drag-over');
    // Insert dragSrc before or after tile based on position
    const allTiles = [...grid.querySelectorAll('.photo-tile')];
    const srcIdx   = allTiles.indexOf(dragSrc);
    const dstIdx   = allTiles.indexOf(tile);
    if (srcIdx < dstIdx) {
      grid.insertBefore(dragSrc, tile.nextSibling);
    } else {
      grid.insertBefore(dragSrc, tile);
    }
    // Renumber
    [...grid.querySelectorAll('.photo-tile')].forEach((t, i) => {
      t.dataset.photoIdx = i;
      const num = t.querySelector('.photo-tile-num');
      if (num) num.textContent = '#' + (i + 1);
      const rmBtn = t.querySelector('.photo-tile-remove');
      if (rmBtn) rmBtn.dataset.removePhoto = i;
    });
    // Rebuild URL panel
    const urlBody = document.getElementById('photo-url-body');
    if (urlBody && urlBody.classList.contains('open')) {
      const srcs = getPhotoSrcsFromGrid();
      urlBody.innerHTML = srcs.map((src, i) =>
        '<div class="photo-url-vis-row">' +
        '<span class="photo-url-vis-num">' + (i + 1) + '</span>' +
        '<input type="text" class="photo-url-vis" data-url-idx="' + i + '" value="' + escHtml(src) + '" style="flex:1;" placeholder="sq:URL or drive:FILE_ID">' +
        '</div>'
      ).join('');
    }
  });
}

function openAdminLb(idx) {
  ADMIN_LB_SRCS = getPhotoSrcsFromGrid();
  if (!ADMIN_LB_SRCS.length) return;
  ADMIN_LB_IDX = Math.max(0, Math.min(idx, ADMIN_LB_SRCS.length - 1));
  updateAdminLb();
  document.getElementById('admin-lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAdminLb() {
  const el = document.getElementById('admin-lb');
  if (el) el.classList.remove('open');
  document.body.style.overflow = '';
}

function stepAdminLb(dir) {
  ADMIN_LB_SRCS = getPhotoSrcsFromGrid();
  if (!ADMIN_LB_SRCS.length) { closeAdminLb(); return; }
  ADMIN_LB_IDX = (ADMIN_LB_IDX + dir + ADMIN_LB_SRCS.length) % ADMIN_LB_SRCS.length;
  updateAdminLb();
}

function updateAdminLb() {
  const src  = ADMIN_LB_SRCS[ADMIN_LB_IDX] || '';
  const img  = document.getElementById('admin-lb-img');
  const ctr  = document.getElementById('admin-lb-counter');
  const prev = document.getElementById('admin-lb-prev');
  const next = document.getElementById('admin-lb-next');
  if (img) img.src = resolvePhotoUrl(src, 'w1600');
  if (ctr) ctr.textContent = ADMIN_LB_SRCS.length > 1 ? (ADMIN_LB_IDX + 1) + ' / ' + ADMIN_LB_SRCS.length : '';
  const multi = ADMIN_LB_SRCS.length > 1;
  if (prev) prev.style.display = multi ? '' : 'none';
  if (next) next.style.display = multi ? '' : 'none';
}

function removeAdminLbPhoto() {
  if (!ADMIN_LB_SRCS.length) return;
  removePhotoRow(ADMIN_LB_IDX);
  ADMIN_LB_SRCS = getPhotoSrcsFromGrid();
  if (!ADMIN_LB_SRCS.length) { closeAdminLb(); return; }
  ADMIN_LB_IDX = Math.min(ADMIN_LB_IDX, ADMIN_LB_SRCS.length - 1);
  updateAdminLb();
}

function doRunMatch() {
  const idx = APP_DATA.extSiteIndex || {};
  const taxa = APP_DATA.taxa.filter(t => t.genus === LINK_MATCH_GENUS && !t.parentId);
  let candidates = [];

  if (LINK_MATCH_SITE === 'cppf') {
    candidates = (idx.cppf && idx.cppf[LINK_MATCH_GENUS]) || [];
    LINK_MATCH_RESULTS = taxa.map(t => {
      let best = null, bestScore = 0;
      candidates.forEach(c => {
        const s = matchScore(t.displayName, c.name);
        if (s > bestScore) { bestScore = s; best = c; }
      });
      return { taxonId: t.id, taxonName: t.displayName, candidateName: best?.name||'', url: best?.url||'', score: bestScore, site: 'CP Photo Finder', approved: false, rejected: false };
    });
  } else if (LINK_MATCH_SITE === 'fierceflora') {
    candidates = (idx.fierceflora && idx.fierceflora[LINK_MATCH_GENUS]) || [];
    LINK_MATCH_RESULTS = taxa.map(t => {
      let best = null, bestScore = 0;
      candidates.forEach(c => {
        const s = matchScore(t.displayName, c.title);
        if (s > bestScore) { bestScore = s; best = c; }
      });
      return { taxonId: t.id, taxonName: t.displayName, candidateName: best?.title||'', url: best?.url||'', score: bestScore, site: 'Fierce Flora', approved: false, rejected: false };
    });
  }
  LINK_MATCH_RESULTS.sort((a,b) => b.score - a.score);
  re_renderMatchTable();
}

function re_renderMatchTable() {
  const el = document.querySelector('.match-table')?.closest('div');
  if (el) el.outerHTML = renderMatchTable();
  else render();
}

function approveMatch(idx) {
  const r = LINK_MATCH_RESULTS[idx];
  if (!r || !r.url) return;
  r.approved = true;
  const t = APP_DATA.taxa.find(x => x.id === r.taxonId);
  if (t) {
    if (!t.externalLinks) t.externalLinks = [];
    const existing = t.externalLinks.find(l => l.site === r.site);
    if (existing) existing.url = r.url;
    else t.externalLinks.push({ site: r.site, url: r.url });
  }
  saveData();
  re_renderMatchTable();
}

function doBatchApprove() {
  LINK_MATCH_RESULTS.filter(r => r.score >= 0.9 && !r.rejected).forEach((_,i) => approveMatch(i));
  showToast('High-confidence matches approved', 'success');
}

// Focused provenance fetch — returns plain data object or null
async function fetchProvenanceAI(taxon) {
  if (!SERVER_CONFIG.hasAnthropicKey) { showToast('Anthropic API key not configured', 'error'); return null; }
  const habitats = (APP_DATA.habitats || []).map(h => '"' + h.id + '" (' + h.name + ')').join(', ');
  const et = ENTRY_TYPES.find(e => e.id === taxon.entryType) || {};
  const identity = taxon.displayName
    + (taxon.genus  ? ' (genus: ' + taxon.genus + ')' : '')
    + (taxon.group  ? ', group: ' + taxon.group : '')
    + (et.label     ? ', entry type: ' + et.label : '');
  const cultivarNote = (taxon.entryType === 'cultivar_reg' || taxon.entryType === 'cultivar_unreg')
    ? '\nNote: this is a cultivar/selected form — provide the PARENT SPECIES native range and habitat, not cultivar-specific info.' : '';
  const prompt =
    'You are an expert botanist specialising in carnivorous plants.\n\n' +
    'Research this specific taxon and return ONLY a JSON object — no explanation, no markdown, no code fences.\n\n' +
    'Taxon: ' + identity + cultivarNote + '\n\n' +
    'CRITICAL RULES:\n' +
    '- Do NOT guess or extrapolate from related species. Only provide data you are confident applies specifically to THIS taxon.\n' +
    '- If this taxon is rare, obscure, or you have limited reliable information, set confidence to "low" and explain in warning.\n' +
    '- If you are unsure whether information is for this taxon or a similar one, omit that field and note it in warning.\n' +
    '- Never invent plausible-sounding data. Omit fields you cannot verify.\n\n' +
    'JSON fields:\n' +
    '  "confidence"   : REQUIRED — "high" (well-documented taxon, certain data) | "medium" (good data, minor gaps) | "low" (rare/obscure, limited sources, or data may be for related taxon)\n' +
    '  "warning"      : string or null — explain any uncertainty, missing data, or risk of confusion with related species\n' +
    '  "country"      : primary country or countries of origin, comma-separated (omit if uncertain)\n' +
    '  "nativeRange"  : 1–2 sentences geographic range at state/province level (omit if uncertain)\n' +
    '  "nativeHabitat": 2–3 sentences describing soil type, hydrology, associated vegetation, elevation (omit if uncertain)\n' +
    '  "habitatId"    : exactly one of these IDs: ' + habitats + ' (omit if uncertain)\n\n' +
    'Return only the JSON object, nothing else.';
  try {
    const resp = await apiPost('/api/ai/research', {
      model: 'claude-sonnet-4-5',
      max_tokens: 800,
      messages: [{ role: 'user', content: prompt }]
    });
    const text = (resp.content && resp.content[0]?.text) || '';
    const m = text.match(/\{[\s\S]+\}/);
    if (m) return JSON.parse(m[0]);
  } catch(e) { console.warn('Provenance AI failed for ' + taxon.displayName + ':', e.message); }
  return null;
}

// Batch: update taxon objects directly and save
// Low-confidence results are flagged but NOT auto-saved — user must review them manually.
async function doMassProvenance() {
  const ids = [...MASS_SELECTED];
  if (!ids.length) return;
  let done = 0, saved = 0, skipped = [];
  const updateProgress = () => showToast('AI Provenance: ' + done + ' / ' + ids.length + ' done…', 'info', 60000);
  updateProgress();
  for (const id of ids) {
    const t = APP_DATA.taxa.find(x => x.id === id);
    if (!t) { done++; updateProgress(); continue; }
    const data = await fetchProvenanceAI(t);
    if (data) {
      const conf = data.confidence || 'low';
      t.provenanceConfidence = conf;
      t.provenanceWarning    = data.warning || '';

      if (conf === 'low') {
        // Flag taxon but do NOT save AI data — requires manual review
        t.flagged = true;
        skipped.push(t.displayName);
      } else {
        // high or medium — apply data
        if (data.country)       t.country      = data.country;
        if (data.nativeRange)   t.nativeRange  = data.nativeRange;
        if (data.nativeHabitat) t.nativeHabitat= data.nativeHabitat;
        if (data.habitatId)     t.habitatId    = data.habitatId;
        saved++;
      }
    }
    done++;
    updateProgress();
    await new Promise(r => setTimeout(r, 400));
  }
  await saveData();
  let msg = 'Provenance filled: ' + saved + ' saved';
  if (skipped.length) msg += ' · ' + skipped.length + ' low-confidence flagged for review: ' + skipped.slice(0,3).join(', ') + (skipped.length > 3 ? '…' : '');
  showToast(msg, skipped.length ? 'info' : 'success', 10000);
  render();
}

async function runAIResearch(taxon, fields) {
  if (!SERVER_CONFIG.hasAnthropicKey) { showToast('Anthropic API key not configured','error'); return; }
  const et = ENTRY_TYPES.find(e => e.id === taxon.entryType) || {};
  const identity = taxon.displayName
    + (taxon.genus  ? ' (genus: ' + taxon.genus + ')' : '')
    + (taxon.group  ? ', group: ' + taxon.group : '')
    + (et.label     ? ', entry type: ' + et.label : '');
  const cultivarNote = (taxon.entryType === 'registered_cultivar' || taxon.entryType === 'unregistered_form')
    ? '\nNote: this is a cultivar/form — use the parent species native range and habitat.' : '';
  const prompt =
    'You are an expert botanist specialising in carnivorous plants.\n\n' +
    'Research this specific taxon: ' + identity + cultivarNote + '\n\n' +
    'Provide JSON with these fields (only if confident): ' + fields.join(', ') + '\n\n' +
    'For care fields use concise, practical grower-oriented language. ' +
    'For native range use scientific geographic terminology. ' +
    'Return only the JSON object, nothing else.';
  try {
    const resp = await apiPost('/api/ai/research', {
      model: 'claude-sonnet-4-5',
      max_tokens: 1024,
      messages: [{role:'user', content: prompt}]
    });
    if (resp.content && resp.content[0]) {
      const text = resp.content[0].text || '';
      const match = text.match(/\{[\s\S]+\}/);
      if (match) {
        try {
          const data = JSON.parse(match[0]);
          Object.keys(data).forEach(k => {
            if (k.startsWith('care.')) { if (!taxon.care) taxon.care={}; taxon.care[k.slice(5)] = data[k]; }
            else taxon[k] = data[k];
          });
          if (data.care) Object.assign(taxon.care||{}, data.care);
        } catch(e) {}
      }
    }
  } catch(e) { console.warn('AI research failed for '+taxon.displayName+':', e.message); }
}

// ═══ BATCH PROVENANCE (Habitats page) ════════════════════════

async function doBatchProvenance(mode) {
  if (HAB_BATCH_RUNNING) return;
  if (!SERVER_CONFIG.hasAnthropicKey) { showToast('Anthropic API key not configured', 'error'); return; }
  const allTaxa = APP_DATA.taxa || [];
  const targets = mode === 'empty'
    ? allTaxa.filter(t => !t.nativeHabitat && !t.nativeRange && !t.country)
    : [...allTaxa];
  if (!targets.length) { showToast('No taxa to research', 'info'); return; }

  HAB_BATCH_RUNNING = true;
  HAB_BATCH_DONE    = 0;
  HAB_BATCH_TOTAL   = targets.length;
  render();

  // Auto-snapshot before batch operation
  try { await fetch('/api/backup', { method: 'POST' }); } catch(_) {}

  const BATCH    = 15;
  const habitats = (APP_DATA.habitats || []).map(h => '"' + h.id + '" (' + h.name + ')').join(', ');
  let updated = 0;

  try {
    for (let start = 0; start < targets.length; start += BATCH) {
      const batch    = targets.slice(start, start + BATCH);
      const taxaList = batch.map((t, i) => {
        const et = ENTRY_TYPES.find(e => e.id === t.entryType) || {};
        return { idx: i, name: t.displayName, genus: t.genus || '', entryType: et.label || t.entryType || 'species', group: t.group || '' };
      });
      const prompt =
        'You are an expert botanist specialising in carnivorous plants.\n\n' +
        'Research each of the following taxa and return ONLY a JSON array — no explanation, no markdown.\n\n' +
        'Taxa:\n' + JSON.stringify(taxaList, null, 2) + '\n\n' +
        'Valid habitatId IDs: ' + habitats + '\n\n' +
        'CRITICAL: Do NOT guess or extrapolate from related species. Only provide data you are confident applies to THIS specific taxon.\n\n' +
        'Return a JSON array, one object per taxon, matching the input "idx". ' +
        'For cultivars/forms (entryType contains "cultivar" or "form"), use the parent species provenance. ' +
        'Each object:\n' +
        '  "idx"          : integer (same as input)\n' +
        '  "confidence"   : "high" | "medium" | "low"\n' +
        '  "warning"      : string or null — note any uncertainty or risk of confusion with related species\n' +
        '  "country"      : primary countries of origin, comma-separated (omit if uncertain)\n' +
        '  "nativeRange"  : 1–2 sentences geographic range at state/province level (omit if uncertain)\n' +
        '  "nativeHabitat": 2–3 sentences: soil, hydrology, vegetation, elevation (omit if uncertain)\n' +
        '  "habitatId"    : one valid habitatId ID (omit if uncertain)\n\n' +
        'Return only the JSON array, nothing else.';
      try {
        const resp = await apiPost('/api/ai/research', {
          model: 'claude-sonnet-4-5',
          max_tokens: 4000,
          messages: [{ role: 'user', content: prompt }]
        });
        const text = (resp.content && resp.content[0]?.text) || '';
        const m = text.match(/\[[\s\S]+\]/);
        if (m) {
          const results = JSON.parse(m[0]);
          for (const r of results) {
            const taxon = batch[r.idx];
            if (!taxon) continue;
            taxon.provenanceConfidence = r.confidence || 'low';
            taxon.provenanceWarning    = r.warning    || '';
            if ((r.confidence || 'low') === 'low') {
              // Low confidence — flag for review, do not overwrite data
              taxon.flagged = true;
            } else {
              if (r.country)       taxon.country       = r.country;
              if (r.nativeRange)   taxon.nativeRange   = r.nativeRange;
              if (r.nativeHabitat) taxon.nativeHabitat = r.nativeHabitat;
              if (r.habitatId)     taxon.habitatId     = r.habitatId;
            }
            updated++;
          }
        }
      } catch(e) { console.warn('Batch provenance error (batch ' + start + '):', e.message); }

      HAB_BATCH_DONE = Math.min(start + BATCH, targets.length);
      render();
      await new Promise(r => setTimeout(r, 500));
    }
    await saveData();
    showToast('Provenance filled for ' + updated + ' taxa', 'success');
  } catch(e) {
    showToast('Batch error: ' + e.message, 'error');
  } finally {
    HAB_BATCH_RUNNING = false;
    render();
  }
}

  }
}

// Batch: update taxon objects directly and save
async function doMassProvenance() {
  const ids = [...MASS_SELECTED];
  if (!ids.length) return;
  // Progress toast
  let done = 0;
  const updateProgress = () => showToast('AI Provenance: ' + done + ' / ' + ids.length + ' done…', 'info', 60000);
  updateProgress();
  for (const id of ids) {
    const t = APP_DATA.taxa.find(x => x.id === id);
    if (!t) continue;
    const data = await fetchProvenanceAI(t);
    if (data) {
      if (data.country)      t.country      = data.country;
      if (data.nativeRange)  t.nativeRange  = data.nativeRange;
      if (data.nativeHabitat)t.nativeHabitat= data.nativeHabitat;
      if (data.climate)      t.climate      = data.climate;
      if (data.habitatId)    t.habitatId    = data.habitatId;
    }
    done++;
    updateProgress();
    // Small pause to be kind to the API
    await new Promise(r => setTimeout(r, 400));
  }
  await saveData();
  showToast('Provenance filled for ' + done + ' taxa', 'success');
  render();
}

async function runAIResearch(taxon, fields) {
  if (!SERVER_CONFIG.hasAnthropicKey) { showToast('Anthropic API key not configured','error'); return; }
  const prompt = 'Research the following carnivorous plant taxon and provide accurate growing information and native range details. Taxon: ' + taxon.displayName +
    '\n\nProvide JSON with these fields (only if confident): ' + fields.join(', ') +
    '\n\nFor care fields use concise, practical grower-oriented language. For native_range use scientific geographic terminology.';
  try {
    const resp = await apiPost('/api/ai/research', {
      model: 'claude-sonnet-4-5',
      max_tokens: 1024,
      messages: [{role:'user', content: prompt}]
    });
    if (resp.content && resp.content[0]) {
      const text = resp.content[0].text || '';
      const match = text.match(/\{[\s\S]+\}/);
      if (match) {
        try {
          const data = JSON.parse(match[0]);
          Object.keys(data).forEach(k => {
            if (k.startsWith('care.')) { if (!taxon.care) taxon.care={}; taxon.care[k.slice(5)] = data[k]; }
            else taxon[k] = data[k];
          });
          if (data.care) Object.assign(taxon.care||{}, data.care);
        } catch(e) {}
      }
    }
  } catch(e) { console.warn('AI research failed for '+taxon.displayName+':', e.message); }
}

// ═══ CSV PARSING (Squarespace) ════════════════════════════════

function computeCSVDiff(incoming) {
  // Returns a diff object describing what the CSV would add to the existing taxon.
  // If no existing taxon: diff.isNew = true.
  const existing = APP_DATA.taxa.find(x => x.displayName === incoming.displayName);
  if (!existing) return { isNew: true, hasChanges: true };

  const existingPhotoSet = new Set(existing.photos || []);
  const existingUrlSet   = new Set((existing.shopLinks || []).map(l => l.url));

  const newPhotos    = (incoming.photos    || []).filter(p => !existingPhotoSet.has(p));
  const newShopLinks = (incoming.shopLinks || []).filter(l => l.url && !existingUrlSet.has(l.url));

  const inCare = incoming.care;
  const exCare = existing.care;
  const newCare = inCare && inCare.override &&
    (inCare.light || inCare.water || inCare.soil || inCare.dormancy || inCare.temp) &&
    !(exCare && exCare.override && (exCare.light || exCare.water || exCare.soil));

  const newGroup = incoming.group && !existing.group;

  const hasChanges = newPhotos.length > 0 || newShopLinks.length > 0 || newCare || newGroup;
  return { isNew: false, hasChanges, newPhotos, newShopLinks, newCare, newGroup };
}

function doParseCSV() {
  const input = document.getElementById('csv-file-input');
  if (!input?.files?.[0]) { showToast('Select a CSV file first','error'); return; }
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    try {
      CSV_PREVIEW = parseSquarespaceCSV(e.target.result);
      // Compute diff for every entry against the live database
      CSV_PREVIEW.forEach(t => { t._diff = computeCSVDiff(t); });
      // Auto-select: new taxa + existing taxa that actually have new data
      CSV_SELECTED = new Set(
        CSV_PREVIEW.filter(t => t._diff.hasChanges).map(t => t.displayName)
      );
      render();
      const newCount     = CSV_PREVIEW.filter(t => t._diff.isNew).length;
      const updatedCount = CSV_PREVIEW.filter(t => !t._diff.isNew && t._diff.hasChanges).length;
      const noChangeCount = CSV_PREVIEW.filter(t => !t._diff.hasChanges).length;
      showToast(
        'Parsed ' + CSV_PREVIEW.length + ' taxa — ' +
        newCount + ' new, ' + updatedCount + ' with updates' +
        (noChangeCount ? ', ' + noChangeCount + ' unchanged' : ''),
        'success'
      );
    } catch(err) { showToast('CSV parse error: ' + err.message, 'error'); }
  };
  reader.readAsText(file, 'utf-8');
}

// Helper: get a field value trying multiple possible column names (case-insensitive key fallback)
function csvField(row, ...names) {
  for (const n of names) {
    if (row[n] !== undefined && row[n] !== '') return row[n];
  }
  // Try case-insensitive
  const lower = names.map(n => n.toLowerCase());
  for (const k of Object.keys(row)) {
    if (lower.includes(k.toLowerCase()) && row[k] !== '') return row[k];
  }
  return '';
}

const FORMAT_SUFFIXES = ['Plant','Seeds','Gemmae','Tuber','Cutting','Rhizome','Division'];
// Matches suffix form: "Name Seeds" or "Name - Seeds"
const FORMAT_SUFFIX_RE = new RegExp('[\\s\\-–]+(' + FORMAT_SUFFIXES.join('|') + ')\\s*$', 'i');
// Matches prefix form: "SEEDS - Name" or "Gemmae – Name"
const FORMAT_PREFIX_RE = new RegExp('^(' + FORMAT_SUFFIXES.join('|') + ')\\s*[-–]\\s*', 'i');

function parseSquarespaceCSV(text) {
  const lines = text.split(/\r?\n/);
  const headers = parseCSVLine(lines[0]);
  const rows = lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals = parseCSVLine(l);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  });

  // Filter plant rows — try multiple category/tag column name variants
  const plantRows = rows.filter(r => {
    const cat = (csvField(r,'Category','Categories','Product Category','Category Name','Tags','Tag') || '').toLowerCase();
    const title = (r['Title']||'').toLowerCase();
    const isCarnivorous = cat.includes('plant') || cat.includes('sundew') || cat.includes('drosera') ||
      cat.includes('pinguicula') || cat.includes('utricularia') || cat.includes('byblis') ||
      cat.includes('dionaea') || cat.includes('drosophyllum') || cat.includes('carnivorous');
    const genusInTitle = /^(drosera|pinguicula|utricularia|byblis|drosophyllum|dionaea)\b/i.test(title);
    return isCarnivorous || genusInTitle;
  });

  // Strip format prefix OR suffix; track which formats exist per base name
  const grouped = {}; // baseName → [{row, format}]
  plantRows.forEach(r => {
    const raw = (r['Title']||'').trim();
    let fmt = 'Plant', base = raw;
    // Check prefix first: "GEMMAE - Drosera x"
    const pfxMatch = raw.match(FORMAT_PREFIX_RE);
    if (pfxMatch) {
      fmt  = pfxMatch[1].charAt(0).toUpperCase() + pfxMatch[1].slice(1).toLowerCase();
      base = raw.slice(pfxMatch[0].length).trim();
    } else {
      // Check suffix: "Drosera x Seeds" or "Drosera x - Seeds"
      const sfxMatch = raw.match(FORMAT_SUFFIX_RE);
      if (sfxMatch) {
        fmt  = sfxMatch[1].charAt(0).toUpperCase() + sfxMatch[1].slice(1).toLowerCase();
        base = raw.slice(0, sfxMatch.index).trim();
      }
    }
    if (!grouped[base]) grouped[base] = [];
    grouped[base].push({ row: r, format: fmt });
  });

  return Object.entries(grouped).map(([title, entries]) => {
    // Prefer the row that has a 'Plant' format for sample (description, care, etc.)
    const plantEntry = entries.find(e => e.format === 'Plant') || entries[0];
    const sample = plantEntry.row;
    const cat   = csvField(sample,'Category','Categories','Product Category','Category Name') || '';
    const tags  = csvField(sample,'Tags','Tag') || '';
    const genus = inferGenus(title, cat);
    const group = inferGroup(cat, tags);

    // Collect all photos from all format rows
    const photos = [];
    const addPhoto = u => { u = u.trim(); if (u && !photos.includes('sq:'+u)) photos.push('sq:'+u); };
    entries.forEach(({row: r}) => {
      const mainImg = r['Image URL'] || r['Image Url'] || r['image_url'] ||
                      r['Product Image URL'] || r['Main Image URL'] || r['Thumbnail URL'] || '';
      mainImg.split(',').forEach(addPhoto);
      ['Additional Image URL 1','Additional Image URL 2','Additional Image URL 3',
       'Additional Image URL 4','Additional Image URL 5',
       'Image URL 2','Image URL 3','Image URL 4'].forEach(col => {
        if (r[col]) r[col].split(',').forEach(addPhoto);
      });
    });
    // Fallback: scan every cell for image-like URLs
    if (!photos.length) {
      entries.forEach(({row: r}) => Object.values(r).forEach(v => {
        if (typeof v === 'string' && /https?:\/\/[^\s,]+\.(jpg|jpeg|png|webp|gif)/i.test(v))
          v.match(/https?:\/\/[^\s,]+\.(jpg|jpeg|png|webp|gif)/gi)?.forEach(addPhoto);
      }));
    }

    // Build shop links — one per listing, label = format type
    const shopLinks = [];
    entries.forEach(({row: r, format}) => {
      const url = r['URL'] || r['Product URL'] || r['Url'] || '';
      if (url) shopLinks.push({ label: format, url });
    });

    const desc = sample['Description'] || '';
    const care = parseCareFromHtml(desc) || {};
    const [sp, sub, entryType, parentHint] = parseSpeciesFromTitle(title, genus);

    // Collect format list for preview display
    const formats = [...new Set(entries.map(e => e.format))].sort();

    return {
      id: generateId(), genus, species: sp, subspecies: sub, entryType,
      displayName: title, commonName: '', group, photos,
      country:'', habitatId:'', climate:'', nativeRange:'', nativeHabitat:'',
      care: Object.keys(care).length ? {...care, override:true} : {override:false},
      shopLinks, externalLinks: [], notes:'',
      parentId:'', _parentHint: parentHint,
      _formats: formats,   // ephemeral — used in preview, deleted before import
      isHybrid: title.includes(' x ') || title.includes(' × '), isGrex:false, flagged:false
    };
  });
}

function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i=0; i<line.length; i++) {
    const ch = line[i];
    if (ch==='"' && !inQ) { inQ=true; }
    else if (ch==='"' && inQ && line[i+1]==='"') { cur+='"'; i++; }
    else if (ch==='"' && inQ) { inQ=false; }
    else if (ch===',' && !inQ) { result.push(cur); cur=''; }
    else cur+=ch;
  }
  result.push(cur); return result;
}

function inferGenus(title, category) {
  const t = title.toLowerCase(), c = category.toLowerCase();
  if (t.startsWith('drosera') || c.includes('sundew') || c.includes('drosera')) return 'Drosera';
  if (t.startsWith('pinguicula') || c.includes('pinguicula') || c.includes('butterwort')) return 'Pinguicula';
  if (t.startsWith('utricularia') || c.includes('utricularia') || c.includes('bladderwort')) return 'Utricularia';
  if (t.startsWith('byblis')) return 'Byblis';
  if (t.startsWith('drosophyllum')) return 'Drosophyllum';
  if (t.startsWith('dionaea') || c.includes('venus')) return 'Dionaea';
  return 'Drosera';
}

function inferGroup(category, tags) {
  const s = (category + ' ' + tags).toLowerCase();
  if (s.includes('pygmy'))      return 'Pygmy';
  if (s.includes('tuberous'))   return 'Tuberous';
  if (s.includes('subtropical')) return 'Subtropical';
  if (s.includes('temperate'))  return 'Temperate';
  if (s.includes('tropical'))   return 'Tropical';
  if (s.includes('winter'))     return 'Winter Growing';
  return '';
}

function guessShopType(title) {
  const t = title.toLowerCase();
  if (t.includes('seed'))   return 'Seeds';
  if (t.includes('gemmae')) return 'Gemmae';
  if (t.includes('tuber'))  return 'Tuber';
  if (t.includes('cutting'))return 'Cutting';
  return 'Plant';
}

function parseSpeciesFromTitle(title, genus) {
  // Remove genus prefix
  let rest = title.replace(new RegExp('^'+genus+'\\s*','i'),'').trim();
  // Check for location form in parens
  const locMatch = rest.match(/^([^(]+)\s*\(([^)]+)\)$/);
  if (locMatch) return [locMatch[1].trim(), locMatch[2].trim(), 'location', locMatch[1].trim()];
  // Check for registered cultivar in single quotes
  const regMatch = rest.match(/^([^']+)\s*'([^']+)'$/);
  if (regMatch) return [regMatch[1].trim(), regMatch[2], 'cultivar_reg', regMatch[1].trim()];
  // Check for unregistered cultivar in double quotes
  const unregMatch = rest.match(/^([^"]+)\s*"([^"]+)"$/);
  if (unregMatch) return [unregMatch[1].trim(), unregMatch[2], 'cultivar_unreg', unregMatch[1].trim()];
  // Named hybrid
  if (rest.includes(' x ') || rest.includes(' × ')) return [rest, '', 'named_hybrid', ''];
  return [rest, '', 'species', ''];
}

function parseCareFromHtml(html) {
  // Strip HTML tags
  const text = html.replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ');
  const section = text.match(/growing information[:\s]*([\s\S]*?)(?:description:|$)/i)?.[1] || text;
  const get = key => section.match(new RegExp(key+':\\s*([^\\n]+)','i'))?.[1]?.trim() || '';
  const light    = get('light');
  const water    = get('water');
  const soil     = get('soil');
  const dormancy = get('dormancy');
  const temp     = get('climate') || get('temperature') || get('temp');
  const notes    = get('notes') || get('growing') || '';
  if (!light && !water && !soil) return null;
  return { light, water, soil, dormancy, temp, notes, override: true };
}

function doImportCSV() {
  if (!CSV_SELECTED.size) { showToast('No taxa selected — check at least one item', 'error'); return; }
  const toImport = CSV_PREVIEW.filter(t => CSV_SELECTED.has(t.displayName));
  let added = 0, updated = 0;
  toImport.forEach(incoming => {
    // Strip ephemeral preview fields
    const t = { ...incoming };
    delete t._parentHint;
    delete t._formats;
    delete t._diff;

    const idx = APP_DATA.taxa.findIndex(x => x.displayName === t.displayName);
    if (idx >= 0) {
      const ex = APP_DATA.taxa[idx];
      // Merge shop links — add any new ones not already present by URL
      const existingUrls = new Set((ex.shopLinks || []).map(l => l.url));
      const newLinks = (t.shopLinks || []).filter(l => l.url && !existingUrls.has(l.url));
      // Merge photos — add new drive/sq photos not already present
      const existingPhotos = new Set(ex.photos || []);
      const newPhotos = (t.photos || []).filter(p => !existingPhotos.has(p));
      // Preserve existing care/notes unless incoming has override care
      APP_DATA.taxa[idx] = {
        ...ex,
        // Update non-destructive fields
        group:      t.group || ex.group,
        isHybrid:   t.isHybrid || ex.isHybrid,
        shopLinks:  [...(ex.shopLinks || []), ...newLinks],
        photos:     [...(ex.photos || []), ...newPhotos],
        // Only overwrite care if the CSV had parseable care data
        care:       (t.care && t.care.override && (t.care.light || t.care.water || t.care.soil))
                      ? t.care : ex.care,
      };
      updated++;
    } else {
      APP_DATA.taxa.push(t);
      added++;
    }
  });
  syncGenusGroupsFromTaxa();
  saveData().then(() => {
    CSV_PREVIEW = [];
    CSV_SELECTED = new Set();
    showToast('Imported: ' + added + ' new, ' + updated + ' updated', 'success');
    render();
  });
}

// ═══ FOLDER IMPORT ════════════════════════════════════════════

function doParseFolder() {
  const input = document.getElementById('folder-input');
  if (!input?.files?.length) { showToast('Select a folder first','error'); return; }
  FOLDER_PREVIEW = parseFolderStructure(input.files);
  render();
  showToast('Parsed '+FOLDER_PREVIEW.length+' taxa from folder structure','success');
}

function parseFolderStructure(files) {
  const taxa = [];
  const fileList = [...files].map(f => f.webkitRelativePath || f.name);
  const dirs = new Set();
  fileList.forEach(p => { const parts = p.split('/'); for (let i=1;i<parts.length;i++) dirs.add(parts.slice(0,i).join('/')); });

  // Root folder: "Genus (Group)" e.g. "Drosera (Pygmy)"
  const roots = [...dirs].filter(d => !d.includes('/') && d.split('/').length === 1);
  roots.forEach(root => {
    const rootMatch = root.match(/^(.+?)\s*\((.+)\)$/) || [null, root, ''];
    const genus = GENERA.find(g => rootMatch[1].trim().toLowerCase() === g.toLowerCase()) || 'Drosera';
    const group = rootMatch[2]?.trim() || '';

    const depth2 = [...dirs].filter(d => {
      const parts = d.split('/');
      return parts.length === 2 && parts[0] === root;
    });

    depth2.forEach(d2 => {
      const name2 = d2.split('/').pop();
      const [sp, sub2, type2] = parseSpeciesFromTitle(name2, '');
      const parentTaxon = {
        id: generateId(), genus, species: sp, subspecies: sub2, entryType: type2||'species',
        displayName: genus + (sp?' '+sp:'') + (sub2?' '+sub2:''), commonName:'', group,
        photos:[], country:'', habitatId:'', climate:'', nativeRange:'', nativeHabitat:'',
        care:{override:false}, shopLinks:[], externalLinks:[], notes:'',
        parentId:'', isHybrid:false, isGrex:false, flagged:false
      };
      taxa.push(parentTaxon);

      const depth3 = [...dirs].filter(d => {
        const parts = d.split('/');
        return parts.length === 3 && d.startsWith(d2+'/');
      });
      depth3.forEach(d3 => {
        const name3 = d3.split('/').pop();
        const [sp3, sub3, type3] = parseSpeciesFromTitle(name3,'');
        taxa.push({
          id: generateId(), genus, species: sp3||sp, subspecies: sub3||name3, entryType: type3||'cultivar_unreg',
          displayName: parentTaxon.displayName + ' ' + name3, commonName:'', group,
          photos:[], country:'', habitatId:'', climate:'', nativeRange:'', nativeHabitat:'',
          care:{override:false}, shopLinks:[], externalLinks:[], notes:'',
          parentId: parentTaxon.id, isHybrid:false, isGrex:false, flagged:false
        });
      });
    });
  });
  return taxa;
}

function doImportFolder() {
  const newTaxa = FOLDER_PREVIEW.filter(t => !APP_DATA.taxa.find(x => x.displayName === t.displayName));
  newTaxa.forEach(t => APP_DATA.taxa.push(t));
  syncGenusGroupsFromTaxa();
  saveData().then(()=>{
    FOLDER_PREVIEW = [];
    showToast('Imported '+newTaxa.length+' taxa','success');
    render();
  });
}

// ═══ INIT ═════════════════════════════════════════════════════

async function init() {
  await loadData();
  render();
  // Set publish badge initial state based on git dirty
  fetch('/api/git/status').then(r=>r.json()).then(d=>{ DIRTY=d.dirty; updatePublishBadge(); }).catch(()=>{});
}

init();
</script>
